name: Test

on:
  push:
    branches: [ main, master, dev, develop ]
  pull_request:
    branches: [ main, master, dev, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcursor-dev gettext locales
        sudo locale-gen en_US.UTF-8 zh_CN.UTF-8

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Validate translation files
      run: |
        msgfmt --check --check-format -o /tmp/ani2xcursor-zh_CN.mo locale/zh_CN.po

    - name: Build
      run: |
        xmake config -y
        xmake build

    - name: Verify locale artifacts
      run: |
        test -f build/locale/zh_CN/LC_MESSAGES/ani2xcursor.mo

    - name: Build test binary
      run: xmake build ani2xcursor_test

    - name: Run tests
      run: ./build/linux/x86_64/release/ani2xcursor_test

    - name: Locale smoke test
      run: |
        set -euo pipefail
        BIN=./build/linux/x86_64/release/ani2xcursor
        LC_ALL=en_US.UTF-8 "$BIN" --help | grep -q "^Usage: "
        LC_ALL=zh_CN.UTF-8 "$BIN" --help | grep -q "^用法： "
        LC_ALL=zh_CN.UTF-8 "$BIN" /no/such/path 2>&1 | grep -q "输入目录不存在"
