name: Test

on:
  push:
    branches: [ main, master, dev, develop ]
  pull_request:
    branches: [ main, master, dev, develop ]

jobs:
  test:
    name: Test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ca-certificates curl gettext git libxcursor-dev libx11-dev locales
        sudo locale-gen en_US.UTF-8 zh_CN.UTF-8

    - name: Set up xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest
        package-cache: true

    - name: Validate translation files
      run: |
        msgfmt --check --check-format -o /tmp/ani2xcursor-zh_CN.mo locale/zh_CN.po

    - name: Build
      run: |
        xmake f -y -m release
        xmake build -y ani2xcursor ani2xcursor_test

    - name: Prepare locale artifacts
      run: |
        mkdir -p build/locale/zh_CN/LC_MESSAGES
        msgfmt -o build/locale/zh_CN/LC_MESSAGES/ani2xcursor.mo locale/zh_CN.po

    - name: Run tests
      run: ./build/ani2xcursor_test

    - name: Locale smoke test
      run: |
        set -euo pipefail
        BIN=./build/ani2xcursor
        locale -a

        VERSION="$("$BIN" --version)"
        HELP_EN="$(LC_ALL=en_US.UTF-8 LANGUAGE=en_US:en "$BIN" --help | sed -n '1p')"
        HELP_ZH="$(LC_ALL=zh_CN.UTF-8 LANGUAGE=zh_CN:en "$BIN" --help | sed -n '1p')"
        ERR_ZH="$(LC_ALL=zh_CN.UTF-8 LANGUAGE=zh_CN:en "$BIN" /no/such/path 2>&1 || true)"

        echo "VERSION=$VERSION"
        echo "HELP_EN=$HELP_EN"
        echo "HELP_ZH=$HELP_ZH"
        echo "ERR_ZH=$ERR_ZH"

        echo "$VERSION" | grep -q "^ani2xcursor "
        echo "$HELP_EN" | grep -q "^Usage:"
        echo "$HELP_ZH" | grep -q "用法"
        echo "$ERR_ZH" | grep -q "输入目录不存在"
