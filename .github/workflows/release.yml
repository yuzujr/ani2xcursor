name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create tag for manual release
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git rev-parse "refs/tags/${{ github.event.inputs.tag }}" >/dev/null 2>&1; then
          echo "Tag '${{ github.event.inputs.tag }}' already exists."
        else
          git tag "${{ github.event.inputs.tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ github.event.inputs.tag }}"
        fi

    - name: Resolve release metadata
      id: meta
      run: |
        if [ -n "${{ github.event.inputs.tag }}" ]; then
          TAG_NAME="${{ github.event.inputs.tag }}"
        else
          TAG_NAME="${GITHUB_REF_NAME}"
        fi

        VERSION="${TAG_NAME#v}"

        echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcursor-dev libx11-dev libspdlog-dev libfmt-dev libstb-dev gettext locales
        sudo locale-gen en_US.UTF-8 zh_CN.UTF-8

    - name: Validate translation files
      run: |
        msgfmt --check --check-format -o /tmp/ani2xcursor-zh_CN.mo locale/zh_CN.po

    - name: Build
      run: make

    - name: Prepare locale artifacts
      run: |
        mkdir -p build/locale/zh_CN/LC_MESSAGES
        msgfmt -o build/locale/zh_CN/LC_MESSAGES/ani2xcursor.mo locale/zh_CN.po

    - name: Build test binary
      run: |
        c++ -std=c++20 -Wall -Wextra -O2 -Iinclude \
          $(pkg-config --cflags spdlog xcursor stb) \
          tests/test_inf_parser.cpp src/cli.cpp src/inf_parser.cpp src/riff_reader.cpp src/ani_parser.cpp src/ico_cur_decoder.cpp src/xcursor_writer.cpp \
          -DANI2XCURSOR_VERSION=\"$(cat VERSION)\" \
          -o build/ani2xcursor_test \
          $(pkg-config --libs spdlog xcursor) -lpthread

    - name: Run tests
      run: ./build/ani2xcursor_test

    - name: Locale smoke test
      run: |
        set -euo pipefail
        BIN=./build/ani2xcursor
        locale -a

        VERSION="$("$BIN" --version)"
        HELP_EN="$(LC_ALL=en_US.UTF-8 LANGUAGE=en_US:en "$BIN" --help | head -n 1)"
        HELP_ZH="$(LC_ALL=zh_CN.UTF-8 LANGUAGE=zh_CN:en "$BIN" --help | head -n 1)"

        echo "VERSION=$VERSION"
        echo "HELP_EN=$HELP_EN"
        echo "HELP_ZH=$HELP_ZH"

        echo "$VERSION" | grep -q "^ani2xcursor "
        echo "$HELP_EN" | grep -q "^Usage:"
        echo "$HELP_ZH" | grep -q "用法"

    - name: Package binary
      run: |
        set -euo pipefail
        ASSET="ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-${{ matrix.arch }}.tar.gz"

        mkdir -p release/share
        cp build/ani2xcursor release/ani2xcursor
        cp README.md LICENSE release/
        cp -r completions release/
        cp -r build/locale release/share/

        tar -czf "$ASSET" -C release .

    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.arch }}
        path: ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-${{ matrix.arch }}.tar.gz
        if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build

    steps:
    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: release-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.prepare-release.outputs.tag_name }}
        target_commitish: ${{ github.sha }}
        files: artifacts/*.tar.gz
        body: |
          ## ani2xcursor v${{ needs.prepare-release.outputs.version }}

          Convert Windows animated cursor themes (.ani/.cur) to Linux Xcursor format.

          ### Assets

          - `ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-x86_64.tar.gz`
          - `ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-arm64.tar.gz`

          ### Installation

          Extract the archive for your CPU architecture, then install the binary and locale files:

          ```bash
          tar -xzf ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-<arch>.tar.gz
          sudo install -Dm755 ani2xcursor /usr/local/bin/ani2xcursor
          sudo mkdir -p /usr/local/share/locale
          sudo cp -r share/locale/* /usr/local/share/locale/
          ```

          ### Usage

          ```bash
          ani2xcursor /path/to/cursor/folder
          ```

          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed documentation.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
