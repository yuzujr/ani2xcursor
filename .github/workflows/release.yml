name: Release

on:
  push:
    branches: [ main, master, dev, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, dev, develop ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      is_release: ${{ steps.meta.outputs.is_release }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create tag for manual release
      if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git rev-parse "refs/tags/${{ github.event.inputs.tag }}" >/dev/null 2>&1; then
          echo "Tag '${{ github.event.inputs.tag }}' already exists."
        else
          git tag "${{ github.event.inputs.tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ github.event.inputs.tag }}"
        fi

    - name: Resolve release metadata
      id: meta
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
          TAG_NAME="${{ github.event.inputs.tag }}"
          VERSION="${TAG_NAME#v}"
          ARTIFACT_VERSION="${VERSION}"
          IS_RELEASE=true
        elif [ "${{ github.ref_type }}" = "tag" ]; then
          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"
          ARTIFACT_VERSION="${VERSION}"
          IS_RELEASE=true
        else
          TAG_NAME=""
          VERSION="$(cat VERSION)"
          ARTIFACT_VERSION="${VERSION}+$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          IS_RELEASE=false
        fi

        echo "artifact_version=${ARTIFACT_VERSION}" >> "$GITHUB_OUTPUT"
        echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"
        echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    env:
      XMAKE_ROOT: y
    container:
      image: ${{ matrix.container_image }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            container_image: debian:11
            glibc_baseline: "2.31"
          - arch: aarch64
            runner: ubuntu-24.04-arm
            container_image: debian:11
            glibc_baseline: "2.31"

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          bash \
          binutils \
          build-essential \
          ca-certificates \
          curl \
          desktop-file-utils \
          file \
          gettext \
          git \
          libx11-dev \
          libxcursor-dev \
          locales \
          pkg-config \
          squashfs-tools
        locale-gen en_US.UTF-8 zh_CN.UTF-8

    - name: Set up xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest
        package-cache: true

    - name: Show build environment
      run: |
        uname -a
        ldd --version | sed -n '1p'
        xmake --version | sed -n '1p'

    - name: Validate translation files
      run: |
        msgfmt --check --check-format -o /tmp/ani2xcursor-zh_CN.mo locale/zh_CN.po

    - name: Build
      run: |
        xmake f -y -m release
        xmake build -y ani2xcursor
        xmake build -y ani2xcursor_test

    - name: Prepare locale artifacts
      run: |
        mkdir -p build/locale/zh_CN/LC_MESSAGES
        msgfmt -o build/locale/zh_CN/LC_MESSAGES/ani2xcursor.mo locale/zh_CN.po

    - name: Download AppImage tools
      run: |
        set -euo pipefail
        curl -L -o linuxdeploy.AppImage \
          "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch }}.AppImage"
        curl -L -o appimagetool.AppImage \
          "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
        curl -L -o runtime \
          "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-${{ matrix.arch }}"
        chmod +x linuxdeploy.AppImage appimagetool.AppImage

    - name: Run tests
      run: ./build/ani2xcursor_test

    - name: Locale smoke test
      run: |
        set -euo pipefail
        BIN=./build/ani2xcursor
        locale -a

        VERSION="$("$BIN" --version)"
        HELP_EN="$(LC_ALL=en_US.UTF-8 LANGUAGE=en_US:en "$BIN" --help | sed -n '1p')"
        HELP_ZH="$(LC_ALL=zh_CN.UTF-8 LANGUAGE=zh_CN:en "$BIN" --help | sed -n '1p')"

        echo "VERSION=$VERSION"
        echo "HELP_EN=$HELP_EN"
        echo "HELP_ZH=$HELP_ZH"

        echo "$VERSION" | grep -q "^ani2xcursor "
        echo "$HELP_EN" | grep -q "^Usage:"
        echo "$HELP_ZH" | grep -q "用法"

    - name: Package AppImage
      run: |
        set -euo pipefail
        bash scripts/build-appimage.sh \
          "${{ matrix.arch }}" \
          "${{ needs.prepare-release.outputs.version }}" \
          "$PWD/linuxdeploy.AppImage" \
          "$PWD/appimagetool.AppImage" \
          "ani2xcursor-v${{ needs.prepare-release.outputs.artifact_version }}-linux-${{ matrix.arch }}.AppImage" \
          "$PWD/runtime"

    - name: Check glibc baseline
      run: |
        set -euo pipefail
        mapfile -d '' files < <(find build AppDir -type f -print0)
        bash scripts/check-glibc-baseline.sh "${{ matrix.glibc_baseline }}" "${files[@]}"

    - name: Upload build artifact
      if: ${{ needs.prepare-release.outputs.is_release != 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.arch }}
        path: ani2xcursor-v${{ needs.prepare-release.outputs.artifact_version }}-linux-${{ matrix.arch }}.AppImage
        if-no-files-found: error

    - name: Upload release artifact
      if: ${{ needs.prepare-release.outputs.is_release == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.arch }}
        path: ani2xcursor-v${{ needs.prepare-release.outputs.artifact_version }}-linux-${{ matrix.arch }}.AppImage
        if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    if: ${{ needs.prepare-release.outputs.is_release == 'true' }}
    needs:
      - prepare-release
      - build

    steps:
    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: release-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.prepare-release.outputs.tag_name }}
        target_commitish: ${{ github.sha }}
        files: artifacts/*.AppImage
        body: |
          ## ani2xcursor v${{ needs.prepare-release.outputs.version }}

          Convert Windows animated cursor themes (.ani/.cur) to Linux Xcursor format.

          ### Assets

          - `ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-x86_64.AppImage`
          - `ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-aarch64.AppImage`

          ### Installation

          Download the AppImage for your CPU architecture, make it executable, and run it:

          ```bash
          chmod +x ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-<arch>.AppImage
          ./ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-<arch>.AppImage --version
          ```

          If FUSE is unavailable on your system:

          ```bash
          APPIMAGE_EXTRACT_AND_RUN=1 ./ani2xcursor-v${{ needs.prepare-release.outputs.version }}-linux-<arch>.AppImage --version
          ```

          The AppImages are built in a Debian 11 userspace, so they should stay compatible with systems that provide `glibc 2.31` or newer.

          On NixOS, run it with `appimage-run`.

          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed documentation.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
